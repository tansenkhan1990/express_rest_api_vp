services:
  # ─── MongoDB ───────────────────────────────────
  mongo:
    image: mongo:7
    container_name: express-auth-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: express-auth
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── API (Production) ──────────────────────────
  app:
    build:
      context: .
      target: production
    container_name: express-auth-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    profiles:
      - prod
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - MONGO_URI=mongodb://mongo:27017/express-auth
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-15m}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}

  # ─── API (Development with hot reload) ─────────
  app-dev:
    build:
      context: .
      target: builder
    container_name: express-auth-api-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    profiles:
      - dev
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - MONGO_URI=mongodb://mongo:27017/express-auth
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-dev_access_secret}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-15m}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-dev_refresh_secret}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}
    command: npm run dev

volumes:
  mongo_data:
